simulations:
  input-looms: [
    <DATA_DIR>/S1.cells.loom,
    <DATA_DIR>/S2.cells.loom,
    <DATA_DIR>/S3.cells.loom]
  output-folder: <DATA_DIR>/simulations
  repeats: 1
  fractions: [0.33, 0.33, 0.33] # [[0.6, 0.3, 0.1]] # [0.33, 0.33, 0.33]
  doublets: [0.1] # [0.3]
  downsamples: [0.1, 0.25, 0.5]

  algorithms:
    demoTape:
      run: True

    scSplit:
      run: True
      exe: <SCSPLIT_DIR>/scSplit

    souporcell:
      run: True
      exe: <SOUPORCELLDIR>/souporcell/target/release/souporcell
      troublet: <SOUPORCELLDIR>/troublet/target/release/troublet

    vireo:
      run: True

    doubletD:
      run: True
      exe: 